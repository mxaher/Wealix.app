    <path
      d="
        M230 80
        C195 80 170 108 170 143
        C170 178 195 206 230 206
        C248 206 262 198 272 186
        L230 143 L188 100
        C198 88 212 80 230 80 Z

        M230 80
        C265 80 290 108 290 143
        C290 178 265 206 230 206
        C212 206 198 198 188 186
        L230 143 L272 100
        C262 88 248 80 230 80 Z
      "
      fill="none"
      stroke="white"
      stroke-width="18"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
  <!-- Cleaner direct path: Wealix W-infinity mark -->
